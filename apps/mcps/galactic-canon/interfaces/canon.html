<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Galactic Canon</title>
  <style>
    :root{--bg:#f4f2ed;--panel:#fffdf8;--ink:#20211e;--muted:#77766f;--line:#dedbd2;--accent:#5b4bd8;--accent2:#eeeaff;--green:#197250;--amber:#a65d00;--red:#a43d42;--shadow:0 18px 60px rgba(54,49,36,.10)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font:14px/1.5 Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.app{height:100vh;min-height:620px;display:grid;grid-template-columns:390px 1fr;overflow:hidden}
    .rail{border-right:1px solid var(--line);background:rgba(255,253,248,.82);backdrop-filter:blur(16px);display:flex;flex-direction:column;min-width:0}.brand{padding:22px 22px 12px;display:flex;align-items:center;gap:12px}.mark{width:36px;height:36px;border-radius:11px;background:linear-gradient(145deg,#7567ef,#4434b9);color:white;display:grid;place-items:center;font:700 17px Georgia,serif;box-shadow:0 8px 22px rgba(91,75,216,.25)}h1{font:600 19px/1.1 Georgia,serif;margin:0}.sub{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}.tools{padding:10px 18px 14px;display:grid;gap:10px}.search{position:relative}.search input{width:100%;border:1px solid var(--line);border-radius:11px;background:white;padding:10px 34px 10px 12px;outline:none}.search input:focus{border-color:#a99ff1;box-shadow:0 0 0 3px rgba(91,75,216,.10)}.search span{position:absolute;right:11px;top:9px;color:var(--muted)}.filters{display:flex;gap:8px}.filters select{min-width:0;flex:1;border:1px solid var(--line);background:white;border-radius:9px;padding:7px 9px}.primary{border:0;border-radius:9px;background:var(--accent);color:white;font-weight:650;padding:8px 12px;box-shadow:0 5px 14px rgba(91,75,216,.20)}.secondary{border:1px solid var(--line);border-radius:9px;background:white;padding:7px 10px}.danger{color:var(--red)}.stats{padding:0 20px 10px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between}.list{overflow:auto;padding:0 10px 22px}.item{padding:13px 12px;border-radius:12px;margin:3px 0;border:1px solid transparent;cursor:pointer}.item:hover{background:#fff}.item.active{background:#fff;border-color:#cbc5f4;box-shadow:0 7px 20px rgba(51,45,33,.06)}.item-title{font-weight:650;line-height:1.25;margin-bottom:5px}.item-statement{font-size:12px;color:#66655e;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta-line{margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;border-radius:999px;padding:2px 7px;background:#ece9e1;color:#5e5c54;font-size:10px;line-height:1.4}.chip.active{background:#e1f3e9;color:var(--green)}.chip.superseded{background:#fff0d9;color:var(--amber)}.chip.archived{background:#eee;color:#666}.chip.tag{background:var(--accent2);color:#5142bb}.date{font-size:10px;color:#99978f;margin-left:auto}
    .main{overflow:auto;position:relative}.empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);padding:40px}.empty .symbol{font:52px Georgia,serif;color:#b8b2e8}.detail{max-width:1040px;margin:0 auto;padding:34px 42px 80px}.detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:9px}.detail h2{font:600 34px/1.12 Georgia,serif;margin:0;max-width:780px}.actions{display:flex;gap:8px;flex-wrap:wrap}.statement{font:20px/1.55 Georgia,serif;margin:25px 0;padding:20px 23px;border-left:4px solid var(--accent);background:rgba(255,253,248,.75);border-radius:0 14px 14px 0}.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:15px 0}.facts{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:13px;overflow:hidden;margin:22px 0}.fact{background:var(--panel);padding:12px}.fact b{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}.fact span{font-size:12px;word-break:break-word}.sections{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(280px,.8fr);gap:24px}.card{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:18px 20px;margin-bottom:16px}.card h3{font:600 16px Georgia,serif;margin:0 0 11px}.prose{white-space:pre-wrap;color:#41423e}.muted{color:var(--muted)}.link-row,.relation{border-top:1px solid #ece9e1;padding:9px 0;font-size:12px}.link-row:first-of-type,.relation:first-of-type{border-top:0}.link-row a{color:var(--accent);text-decoration:none;word-break:break-all}.comment{border-top:1px solid #ece9e1;padding:12px 0}.comment:first-of-type{border-top:0}.comment-head{display:flex;gap:7px;align-items:center;font-size:10px;color:var(--muted);margin-bottom:5px}.comment-body{white-space:pre-wrap}.comment-form textarea{width:100%;min-height:74px;resize:vertical;border:1px solid var(--line);border-radius:9px;padding:9px;background:white}.comment-form .row{display:flex;gap:8px;margin-top:8px}.comment-form select{border:1px solid var(--line);border-radius:8px;padding:6px;background:white}.revision{padding:8px 0;border-top:1px solid #ece9e1;font-size:12px}.revision:first-of-type{border-top:0}.embedding{display:flex;align-items:center;gap:6px}.dot{width:7px;height:7px;border-radius:50%;background:#aaa}.dot.ready{background:var(--green)}.dot.failed{background:var(--red)}.dot.pending{background:var(--amber)}
    dialog{border:0;border-radius:18px;padding:0;width:min(760px,calc(100vw - 34px));max-height:90vh;box-shadow:var(--shadow);background:var(--panel)}dialog::backdrop{background:rgba(32,31,28,.36);backdrop-filter:blur(3px)}.modal-head{padding:20px 24px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}.modal-head h3{font:600 22px Georgia,serif;margin:0}.x{border:0;background:transparent;font-size:24px;color:var(--muted)}.form{padding:20px 24px 24px;overflow:auto;max-height:calc(90vh - 68px)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field{display:grid;gap:5px;margin-bottom:13px}.field label{font-size:11px;font-weight:650;color:#626159}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:white;border-radius:9px;padding:9px 10px;outline:none}.field textarea{min-height:92px;resize:vertical}.field input:focus,.field textarea:focus{border-color:#a99ff1;box-shadow:0 0 0 3px rgba(91,75,216,.08)}.form-foot{display:flex;justify-content:flex-end;gap:9px;padding-top:8px}.toast{position:fixed;right:24px;bottom:22px;background:#25251f;color:white;border-radius:10px;padding:10px 14px;box-shadow:var(--shadow);z-index:20;opacity:0;transform:translateY(8px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:none}.loading{opacity:.55;pointer-events:none}
    @media(max-width:800px){.app{grid-template-columns:1fr}.rail{height:48vh;border-right:0;border-bottom:1px solid var(--line)}.main{height:52vh}.detail{padding:24px 18px 60px}.detail h2{font-size:28px}.sections{grid-template-columns:1fr}.facts{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="rail">
      <div class="brand"><div class="mark">C</div><div><h1>Galactic Canon</h1><div class="sub">Decisions that constrain the future</div></div></div>
      <div class="tools">
        <div class="search"><input id="search" placeholder="Search meaning, rationale, consequences…"><span>⌕</span></div>
        <div class="filters"><select id="status"><option value="active">Active</option><option value="all">All statuses</option><option value="superseded">Superseded</option><option value="archived">Archived</option></select><select id="tag"><option value="">All tags</option></select><button class="primary" id="new">New</button></div>
      </div>
      <div class="stats"><span id="count">0 decisions</span><button class="secondary" id="tagsBtn">Tags</button></div>
      <div class="list" id="list"></div>
    </aside>
    <main class="main" id="main"><div class="empty"><div><div class="symbol">§</div><h2>Select a decision</h2><p>Canon gives humans and connected agents the same durable source of truth.</p></div></div></main>
  </div>

  <dialog id="editor"><div class="modal-head"><h3 id="editorTitle">New decision</h3><button class="x" data-close="editor">×</button></div><form class="form" id="decisionForm">
    <input type="hidden" name="decision_id"><div class="field"><label>Title</label><input name="title" required maxlength="300"></div><div class="field"><label>Canonical decision</label><textarea name="statement" required></textarea></div>
    <div class="grid2"><div class="field"><label>Rationale</label><textarea name="rationale"></textarea></div><div class="field"><label>Consequences and constraints</label><textarea name="consequences"></textarea></div></div>
    <div class="field"><label>Alternatives considered</label><textarea name="alternatives"></textarea></div><div class="field"><label>Tags · comma separated</label><input name="tags" placeholder="architecture, admin-fleet"></div>
    <div class="grid2"><div class="field"><label>Decision date</label><input name="decided_at" type="datetime-local"></div><div class="field"><label>Review due</label><input name="review_due_at" type="datetime-local"></div></div>
    <div class="grid2"><div class="field"><label>Author type</label><select name="author_type"><option value="collaborative">Collaborative</option><option value="agent">Agent</option><option value="human">Human</option></select></div><div class="field"><label>Author label</label><input name="author_label" placeholder="Russell + Codex"></div></div>
    <div class="field"><label>Source reference</label><input name="source_ref" placeholder="PR, commit, task, or URL"></div><div class="field edit-only"><label>Revision comment</label><input name="change_comment" placeholder="Why this edit was made"></div>
    <div class="form-foot"><button type="button" class="secondary" data-close="editor">Cancel</button><button class="primary" type="submit">Save to Canon</button></div>
  </form></dialog>

  <dialog id="tagDialog"><div class="modal-head"><h3>Tag taxonomy</h3><button class="x" data-close="tagDialog">×</button></div><div class="form"><div id="tagManager"></div><form id="tagForm" class="grid2" style="margin-top:16px"><div class="field"><label>New tag</label><input name="name" required placeholder="full-time-agents"></div><div class="field"><label>Description</label><input name="description"><button class="primary" style="justify-self:start">Add tag</button></div></form></div></dialog>
  <div class="toast" id="toast"></div>

  <script>
  (function(){
    var state={decisions:[],tags:[],selected:null,details:null,searchTimer:null};
    var $=function(s){return document.querySelector(s)};
    var esc=function(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[c]})};
    var fmt=function(v){if(!v)return '—';try{return new Date(v).toLocaleString([], {dateStyle:'medium',timeStyle:'short'})}catch(_){return v}};
    var isoLocal=function(v){if(!v)return '';var d=new Date(v),z=d.getTimezoneOffset()*60000;return new Date(d-z).toISOString().slice(0,16)};
    async function call(name,args){if(!window.galactic||!galactic.call)throw new Error('Galactic interface bridge unavailable');return await galactic.call(name,args||{})}
    function toast(msg,bad){var el=$('#toast');el.textContent=msg;el.style.background=bad?'#8f3439':'#25251f';el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2600)}
    function busy(on){$('#app').classList.toggle('loading',!!on)}
    function chips(tags){return(tags||[]).map(function(t){return'<span class="chip tag">'+esc(t.name||t.slug)+'</span>'}).join('')}
    async function loadTags(){var r=await call('canon_tags',{action:'list'});state.tags=r.tags||[];$('#tag').innerHTML='<option value="">All tags</option>'+state.tags.map(function(t){return'<option value="'+esc(t.slug)+'">'+esc(t.name)+'</option>'}).join('');renderTagManager()}
    async function load(){busy(true);try{var q=$('#search').value.trim(),status=$('#status').value,tag=$('#tag').value,r;if(q)r=await call('canon_search',{query:q,status:status,tags:tag?[tag]:[],limit:100,threshold:.05});else r=await call('canon_list',{status:status,tags:tag?[tag]:[],limit:200});state.decisions=r.decisions||[];renderList();if(state.selected&&!state.decisions.some(function(d){return d.id===state.selected}))select(null)}catch(e){toast(String(e),true)}finally{busy(false)}}
    function renderList(){var list=$('#list');$('#count').textContent=state.decisions.length+' decision'+(state.decisions.length===1?'':'s');if(!state.decisions.length){list.innerHTML='<div class="empty" style="height:220px"><div>No matching decisions</div></div>';return}list.innerHTML=state.decisions.map(function(d){return'<div class="item '+(d.id===state.selected?'active':'')+'" data-id="'+esc(d.id)+'"><div class="item-title">'+esc(d.title)+'</div><div class="item-statement">'+esc(d.statement)+'</div><div class="meta-line"><span class="chip '+esc(d.status)+'">'+esc(d.status)+'</span>'+chips((d.tags||[]).slice(0,3))+'<span class="date">'+esc(fmt(d.decided_at))+'</span></div></div>'}).join('');list.querySelectorAll('.item').forEach(function(el){el.onclick=function(){select(el.dataset.id)}})}
    async function select(id){state.selected=id;renderList();if(!id){state.details=null;$('#main').innerHTML='<div class="empty"><div><div class="symbol">§</div><h2>Select a decision</h2><p>Canon gives humans and connected agents the same durable source of truth.</p></div></div>';return}busy(true);try{state.details=await call('canon_get',{decision_id:id,include_revisions:true});renderDetail()}catch(e){toast(String(e),true)}finally{busy(false)}}
    function renderDetail(){var x=state.details,d=x.decision,t=x.tags||[],comments=x.comments||[],ev=x.evidence||[],out=(x.relations&&x.relations.outgoing)||[],inc=(x.relations&&x.relations.incoming)||[],revs=x.revisions||[];$('#main').innerHTML='<div class="detail"><div class="detail-head"><div><div class="eyebrow">Canonical decision · '+esc(d.status)+'</div><h2>'+esc(d.title)+'</h2></div><div class="actions"><button class="secondary" id="editBtn">Edit</button><button class="secondary" id="supBtn">Supersede</button><button class="secondary danger" id="archiveBtn">Archive</button></div></div><div class="statement">'+esc(d.statement)+'</div><div class="tag-row">'+chips(t)+'</div><div class="facts"><div class="fact"><b>Decided</b><span>'+esc(fmt(d.decided_at))+'</span></div><div class="fact"><b>Effective</b><span>'+esc(fmt(d.effective_at))+'</span></div><div class="fact"><b>Author</b><span>'+esc(d.author_label||d.author_type)+'</span></div><div class="fact"><b>Embedding</b><span class="embedding"><i class="dot '+esc(d.embedding_status)+'"></i>'+esc(d.embedding_status)+(d.embedding_dimensions?' · '+d.embedding_dimensions+'d':'')+'</span></div></div><div class="sections"><section><div class="card"><h3>Rationale</h3><div class="prose '+(!d.rationale?'muted':'')+'">'+esc(d.rationale||'No rationale recorded.')+'</div></div><div class="card"><h3>Consequences and constraints</h3><div class="prose '+(!d.consequences?'muted':'')+'">'+esc(d.consequences||'No consequences recorded.')+'</div></div><div class="card"><h3>Alternatives considered</h3><div class="prose '+(!d.alternatives?'muted':'')+'">'+esc(d.alternatives||'No alternatives recorded.')+'</div></div><div class="card"><h3>Comments</h3><div id="comments">'+(comments.length?comments.map(commentHtml).join(''):'<p class="muted">No comments yet.</p>')+'</div><form class="comment-form" id="commentForm"><textarea name="body" required placeholder="Add implementation detail, outcome, question, or clarification…"></textarea><div class="row"><select name="kind"><option>note</option><option>implementation</option><option>outcome</option><option>question</option><option>clarification</option></select><label style="font-size:11px;display:flex;align-items:center;gap:5px"><input type="checkbox" name="include"> Include in agent context</label><button class="primary" style="margin-left:auto">Comment</button></div></form></div></section><aside><div class="card"><h3>Metadata</h3><div class="fact" style="padding:5px 0"><b>Source</b><span>'+esc(d.source_ref||'—')+'</span></div><div class="fact" style="padding:9px 0"><b>Review due</b><span>'+esc(fmt(d.review_due_at))+'</span></div><div class="fact" style="padding:9px 0"><b>Updated</b><span>'+esc(fmt(d.updated_at))+'</span></div><div class="fact" style="padding:9px 0"><b>ID</b><span>'+esc(d.id)+'</span></div></div><div class="card"><h3>Evidence <button class="secondary" id="evidenceBtn" style="float:right;padding:2px 7px">+</button></h3>'+(ev.length?ev.map(function(e){return'<div class="link-row"><span class="chip">'+esc(e.evidence_type)+'</span> <a href="'+esc(e.ref)+'" target="_blank">'+esc(e.label||e.ref)+'</a></div>'}).join(''):'<p class="muted">No evidence linked.</p>')+'</div><div class="card"><h3>Relationships</h3>'+relationsHtml(out,inc)+'</div><div class="card"><h3>Revision history</h3>'+(revs.length?revs.map(function(r){return'<div class="revision"><b>Revision '+esc(r.revision_num)+'</b> · '+esc(fmt(r.created_at))+'<br><span class="muted">'+esc((r.changed_fields||[]).join(', '))+(r.change_comment?' — '+r.change_comment:'')+'</span></div>'}).join(''):'<p class="muted">No revisions.</p>')+'</div></aside></div></div>';
      $('#editBtn').onclick=function(){openEditor(d,t)};$('#archiveBtn').onclick=archiveDecision;$('#supBtn').onclick=supersedeDecision;$('#commentForm').onsubmit=addComment;$('#evidenceBtn').onclick=addEvidence;
    }
    function commentHtml(c){return'<div class="comment"><div class="comment-head"><span class="chip">'+esc(c.kind)+'</span><span>'+esc(c.author_label||c.author_type)+'</span><span>·</span><span>'+esc(fmt(c.created_at))+'</span>'+(c.include_in_context?'<span class="chip tag">agent context</span>':'')+'</div><div class="comment-body">'+esc(c.body)+'</div></div>'}
    function relationsHtml(out,inc){var all=[];(out||[]).forEach(function(r){all.push('<div class="relation"><b>'+esc(r.relation_type)+'</b> → '+esc(r.to_decision_id)+(r.note?'<br><span class="muted">'+esc(r.note)+'</span>':'')+'</div>')});(inc||[]).forEach(function(r){all.push('<div class="relation">← <b>'+esc(r.relation_type)+'</b> from '+esc(r.from_decision_id)+(r.note?'<br><span class="muted">'+esc(r.note)+'</span>':'')+'</div>')});return all.length?all.join(''):'<p class="muted">No relationships.</p>'}
    function openEditor(d,tags){var f=$('#decisionForm');f.reset();f.decision_id.value=d?d.id:'';$('#editorTitle').textContent=d?'Edit decision':'New decision';document.querySelectorAll('.edit-only').forEach(function(el){el.style.display=d?'grid':'none'});if(d){['title','statement','rationale','alternatives','consequences','author_type','author_label','source_ref'].forEach(function(k){if(f[k])f[k].value=d[k]||''});f.tags.value=(tags||[]).map(function(t){return t.name}).join(', ');f.decided_at.value=isoLocal(d.decided_at);f.review_due_at.value=isoLocal(d.review_due_at)}else{f.decided_at.value=isoLocal(new Date());f.author_label.value='Russell + Codex'}$('#editor').showModal()}
    async function saveDecision(e){e.preventDefault();var f=e.target,id=f.decision_id.value,p={title:f.title.value,statement:f.statement.value,rationale:f.rationale.value,alternatives:f.alternatives.value,consequences:f.consequences.value,tags:f.tags.value.split(',').map(function(s){return s.trim()}).filter(Boolean),decided_at:f.decided_at.value?new Date(f.decided_at.value).toISOString():undefined,review_due_at:f.review_due_at.value?new Date(f.review_due_at.value).toISOString():null,author_type:f.author_type.value,author_label:f.author_label.value,source_ref:f.source_ref.value};busy(true);try{var r;if(id){p.decision_id=id;p.change_comment=f.change_comment.value;r=await call('canon_update',p)}else r=await call('canon_create',p);$('#editor').close();toast(id?'Decision revised':'Decision added to Canon');await loadTags();await load();await select((r.decision||{}).id||id)}catch(err){toast(String(err),true)}finally{busy(false)}}
    async function addComment(e){e.preventDefault();var f=e.target;try{await call('canon_comment_add',{decision_id:state.selected,body:f.body.value,kind:f.kind.value,author_type:'collaborative',author_label:'Russell + Codex',include_in_context:f.include.checked});f.reset();toast('Comment added');await select(state.selected)}catch(err){toast(String(err),true)}}
    async function archiveDecision(){if(!confirm('Archive this decision? Its history remains available.'))return;try{await call('canon_archive',{decision_id:state.selected,reason:'Archived from Canon interface',author_type:'human',author_label:'Owner'});toast('Decision archived');await load();await select(state.selected)}catch(e){toast(String(e),true)}}
    async function supersedeDecision(){var id=prompt('Replacement decision ID (create the new active decision first):');if(!id)return;var note=prompt('Why does it supersede this decision?')||'';try{await call('canon_supersede',{decision_id:state.selected,replacement_id:id,note:note,author_type:'collaborative',author_label:'Russell + Codex'});toast('Decision superseded');await load();await select(state.selected)}catch(e){toast(String(e),true)}}
    async function addEvidence(){var ref=prompt('PR, commit, file, URL, task, or run reference:');if(!ref)return;var label=prompt('Label (optional):')||'';var type=/github\.com.*\/pull\//.test(ref)?'pr':/^https?:/.test(ref)?'url':ref.length<=40?'commit':'reference';try{await call('canon_evidence_add',{decision_id:state.selected,type:type,label:label,ref:ref});toast('Evidence linked');await select(state.selected)}catch(e){toast(String(e),true)}}
    function renderTagManager(){var el=$('#tagManager');el.innerHTML=state.tags.length?state.tags.map(function(t){return'<div class="relation" style="display:flex;align-items:center;gap:8px"><span class="chip tag">'+esc(t.name)+'</span><span class="muted" style="flex:1">'+esc(t.description||t.slug)+'</span><button class="secondary danger" data-archive="'+esc(t.id)+'">Archive</button></div>'}).join(''):'<p class="muted">No tags yet.</p>';el.querySelectorAll('[data-archive]').forEach(function(b){b.onclick=async function(){if(!confirm('Archive this tag and remove it from decisions?'))return;await call('canon_tags',{action:'archive',tag_id:b.dataset.archive});await loadTags();await load()}})}
    $('#decisionForm').onsubmit=saveDecision;$('#new').onclick=function(){openEditor(null,[])};$('#tagsBtn').onclick=function(){renderTagManager();$('#tagDialog').showModal()};$('#tagForm').onsubmit=async function(e){e.preventDefault();var f=e.target;try{await call('canon_tags',{action:'upsert',name:f.name.value,description:f.description.value});f.reset();await loadTags();toast('Tag added')}catch(err){toast(String(err),true)}};document.querySelectorAll('[data-close]').forEach(function(b){b.onclick=function(){$('#'+b.dataset.close).close()}});$('#status').onchange=load;$('#tag').onchange=load;$('#search').oninput=function(){clearTimeout(state.searchTimer);state.searchTimer=setTimeout(load,280)};
    Promise.resolve().then(loadTags).then(load).catch(function(e){toast(String(e),true)});
  })();
  </script>
</body>
</html>
