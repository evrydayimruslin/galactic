<script>
(function () {
  var port = null, queue = [], pending = {}, nextId = 1;
  function flush() {
    if (!port) return;
    while (queue.length) {
      var item = queue.shift(), id = nextId++;
      pending[id] = item;
      port.postMessage({ type: "call", id: id, functionName: item.fn, args: item.args || {} });
    }
  }
  window.ul = {
    context: null,
    call: function (fn, args) {
      return new Promise(function (resolve, reject) {
        queue.push({ fn: fn, args: args, resolve: resolve, reject: reject });
        flush();
      });
    },
    resize: function (height) {
      if (port) port.postMessage({ type: "resize", height: height });
    },
  };
  window.addEventListener("message", function (event) {
    var d = event.data;
    if (!d || d.type !== "ul-interface-connect" || !event.ports || !event.ports[0]) return;
    port = event.ports[0];
    window.ul.context = d.context;
    port.onmessage = function (e) {
      var m = e.data;
      if (!m || m.type !== "result" || !(m.id in pending)) return;
      var item = pending[m.id];
      delete pending[m.id];
      if (m.success) item.resolve(m.result);
      else {
        var err = new Error((m.error && m.error.message) || "Call failed");
        err.code = m.error && m.error.type;
        err.type = err.code;
        err.status = m.error && m.error.status;
        err.details = m.error && m.error.details;
        err.retryAt = m.error && m.error.retryAt;
        err.retryable = !!(m.error && m.error.retryable);
        err.scope = m.error && m.error.scope;
        err.autoResumes = !!(m.error && m.error.autoResumes);
        err.ownerActionRequired = !!(m.error && m.error.ownerActionRequired);
        err.executionMode = m.error && m.error.executionMode;
        err.jobId = m.error && m.error.jobId;
        err.completionUnknown = !!(m.error && m.error.completionUnknown);
        item.reject(err);
      }
    };
    flush();
    document.dispatchEvent(new CustomEvent("ul-ready"));
  });
  parent.postMessage({ type: "ul-interface-hello" }, "*");
})();
</script>
<style>
:root{
  --bg:#ffffff; --surface:#f7f7f5; --line:#e3e1dc;

  --red:#b23a3a; --red-soft:#f9ecec;

*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:var(--bg);margin:0;font-size:14px;line-height:1.5;}
button{font:inherit;cursor:pointer;border-radius:8px;padding:6px 14px;font-weight:600;border:1px solid var(--line);background:var(--bg);color:var(--ink)}
button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
button.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
button.ghost{border-style:dashed;color:var(--ink-2)}
button.small{padding:3px 10px;font-size:12px}
button:disabled{opacity:.5;cursor:default}
input,textarea,select{font:inherit;border:1px solid var(--line);border-radius:8px;padding:6px 10px;color:var(--ink);background:var(--bg)}
textarea{width:100%;min-height:140px;resize:vertical;line-height:1.55}
.wrap{padding:10px 12px 16px}
.chip{display:inline-block;font-size:11px;font-weight:600;border-radius:5px;padding:1px 7px;border:1px solid var(--line);color:var(--ink-2);background:var(--bg);white-space:nowrap;vertical-align:1px}
.chip.red{background:var(--red-soft);color:var(--red);border-color:transparent}
.chip.amber{background:var(--amber-soft);color:var(--amber);border-color:transparent}
.chip.green{background:var(--green-soft);color:var(--green);border-color:transparent}
.chip.lang{background:var(--surface)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none}
.dot.red{background:var(--red)}.dot.amber{background:var(--amber)}.dot.none{background:var(--line)}
/* top strip */
.strip{display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);flex-wrap:wrap;align-items:flex-start}
.strip .big{font-size:17px;font-weight:700}

.search{margin-left:auto;min-width:150px;font-size:12.5px;padding:4px 10px}

.split{display:grid;grid-template-columns:2fr 3fr;gap:12px;align-items:start}

  .split{grid-template-columns:1fr}

.list{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;max-height:560px;overflow-y:auto}

.lrow.sel{background:var(--accent-soft)}

.newchip{display:block;width:100%;text-align:center;background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:12px;border:none;border-bottom:1px solid var(--line);padding:6px;border-radius:0}

.card{border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px;background:var(--bg)}
.card .cap{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:700;margin-bottom:5px}
.card.reading{border-color:var(--accent)}
.card.draft{background:var(--surface)}
.detail-head{margin-bottom:8px}
.detail-head .name{font-weight:700;font-size:15px}
.detail-head .meta{color:var(--ink-2);font-size:12.5px}
.caution{background:var(--amber-soft);color:var(--amber);font-size:12.5px;font-weight:600;border-radius:8px;padding:6px 10px;margin-bottom:8px}
.gapchip{display:flex;align-items:center;gap:8px;background:var(--amber-soft);color:var(--amber);font-size:12.5px;font-weight:600;border-radius:8px;padding:6px 10px;margin-top:8px;flex-wrap:wrap}

.gapform{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;width:100%}
.gapform input{flex:1;min-width:160px;font-size:12.5px}
.actionbar{display:flex;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--bg)}
.linky{background:none;border:none;color:var(--accent);font-weight:600;font-size:12.5px;padding:2px 4px}
.body-pre{white-space:pre-wrap;word-break:break-word;font-size:13px;max-height:260px;overflow-y:auto}
.whisper{color:var(--ink-3);font-size:11.5px}
.dd{position:relative;display:inline-block}
.dd-menu{position:absolute;bottom:calc(100% + 6px);left:0;background:var(--bg);border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 24px rgba(30,35,42,.14);padding:8px;min-width:270px;z-index:30;max-height:240px;overflow-y:auto}
.dd-item{display:block;width:100%;text-align:left;border:none;background:none;padding:6px 8px;border-radius:7px;font-weight:500;font-size:12.5px}
.dd-item:hover{background:var(--surface)}
.dd-item .why{display:block;color:var(--ink-3);font-size:11px;font-weight:400}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;background:var(--ink);color:#fff;border-radius:10px;padding:9px 16px;font-size:13px;z-index:50;display:flex;gap:10px;align-items:center;max-width:92vw}
.toast button{background:none;border:none;color:#9fd4c8;font-weight:700;padding:0}
.skel{background:linear-gradient(90deg,var(--surface),#eceae6,var(--surface));border-radius:8px;height:16px;margin:8px 0}
@media (prefers-reduced-motion: no-preference){
  .skel{background-size:200% 100%;animation:sh 1.2s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .toast{transition:opacity .2s}
}
details summary{cursor:pointer;color:var(--ink-2);font-size:12.5px;font-weight:600}
.hist{font-size:12px;color:var(--ink-2);padding:4px 0;border-bottom:1px dashed var(--line)}
.center{color:var(--ink-3);text-align:center;padding:28px 10px;font-size:13px}
.allclear{color:var(--green);font-weight:700;text-align:center;padding:28px 10px}
</style>

<div class="wrap" id="app"><div class="center">Loading your inbox…</div></div>
<script>
"use strict";
/* ---------- utilities ---------- */
function esc(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
var LANG_CODES = {english:"EN",japanese:"JA",german:"DE",french:"FR",spanish:"ES",italian:"IT",portuguese:"PT",chinese:"ZH",korean:"KO",dutch:"NL",russian:"RU"};
function langCode(l){
  if(!l) return "";
  var k = String(l).toLowerCase().trim();
  if (LANG_CODES[k]) return LANG_CODES[k];
  if (k.length <= 3) return k.toUpperCase();
  return k.slice(0,2).toUpperCase();
}
function langName(l){
  if(!l) return "their language";
  var k = String(l).toLowerCase().trim();
  var m = {en:"English",ja:"Japanese",de:"German",fr:"French",es:"Spanish",it:"Italian",pt:"Portuguese",zh:"Chinese",ko:"Korean"};
  if (m[k]) return m[k];
  return l.charAt(0).toUpperCase()+l.slice(1);
}
function parseTs(ts){
  if(!ts) return NaN;
  var s = String(ts).replace(" ", "T");
  if (!/[zZ]|[+-]\d\d:?\d\d$/.test(s)) s += "Z";
  return Date.parse(s);
}
function num(x){ x = +x; return isFinite(x) ? x : 0; }
function ago(ts, ref){
  if(!ts) return "";
  var t = parseTs(ts), r = ref ? parseTs(ref) : Date.now();
  if (!isFinite(t)) return "";
  var s = Math.max(0, (r - t)/1000);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60) + " min ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}
function firstName(c){
  var n = (c.guest_name||"").trim();
  if (n) return n.split(/\s+/)[0];
  return (c.guest_email||"").split("@")[0] || "guest";
}
function displayName(c){
  return (c.guest_name||"").trim() || (c.guest_email||"").split("@")[0] || c.guest_email || "Guest";
}
var REASONS = {
  ignored_instructions: "This email tried to give the agent instructions — it ignored them and filed it",
  auto_generated: "Automatic notification or receipt",
  cc_only: "We were only copied — someone else is answering",
  staff_already_replied: "A team member already answered",
  redundant: "A reply would only repeat what was already said",
  bounce: "Delivery failure report",
  spam: "Spam",
  no_action_needed: "No answer needed"
};
function reasonText(k){
  if(!k) return REASONS.no_action_needed;
  return REASONS[k] || String(k).replace(/_/g," ").replace(/^./,function(c){return c.toUpperCase();});
}
var CLASS_LABEL = {complaint:"Complaint",booking_request:"Booking request",booking_confirmation:"Booking confirmation",inquiry:"Question",cancellation:"Cancellation",feedback:"Feedback",internal:"Internal",spam:"Spam",other:"Message"};
function humanErr(e){
  var code = e && e.code, msg = (e && e.message) || "";
  if (code === "SIGN_IN_REQUIRED") return "Sign in to use this.";
  if (code === "RATE_LIMITED" || code === "BUSY") return "Give it a few seconds — too many requests at once.";
  if (e && (e.ownerActionRequired || String(code || "").toLowerCase() === "agent_cap_too_low_for_request")) {
    return "This Agent's capacity cap is too low for this action. Raise the cap in Agent Settings.";
  }
  if (isCapacityErr(e)) {
    var at = retryTime(e);
    if (e && e.autoResumes) return "Agent work is waiting for capacity" + (at ? " and resumes automatically " + at : " and will resume automatically") + ".";
    return "This action was not queued. Try again when capacity is available" + (at ? " " + at : "") + ".";
  }
  if (e && e.completionUnknown) return "This action was queued, but its result can't be checked right now. Verify the result before trying it again.";
  if (/MISSING_SECRETS|IMAP_HOST|SMTP_HOST|not configured|mailbox isn/i.test(msg)) return "Your mailbox isn't connected yet. Add your email settings in the agent's Settings, then try again.";
  if (/SMTP auth/i.test(msg)) return "Couldn't sign in to your mailbox to send — check the email password in Settings.";
  if (/recipient address|Already sent|Only discarded|required/i.test(msg)) return msg;
  return "Something went wrong — try again.";
}
function isCapacityErr(e){
  var c = String((e && (e.code || e.type)) || "").toLowerCase();
  return c === "capacity_waiting" || c === "agent_cap_waiting" || c === "agent_cap_too_low_for_request" || c === "concurrency_waiting" || c === "concurrencywaitingerror";
}
function retryTime(e){
  var d = e && e.details;
  var raw = (e && e.retryAt) || (d && (d.retry_at || d.retryAt));
  if (!raw) return "";
  var date = new Date(raw);
  return isNaN(date) ? "" : "at " + date.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
}
var capacityRetryTimer = null;
function scheduleCapacityResume(e){
  if (!e || !e.autoResumes || e.ownerActionRequired) return;
  if (capacityRetryTimer) clearTimeout(capacityRetryTimer);
  capacityRetryTimer = null;
  var d = e && e.details;
  var raw = (e && e.retryAt) || (d && (d.retry_at || d.retryAt));
  var at = raw ? new Date(raw).getTime() : NaN;
  if (!isFinite(at)) return;
  var delay = Math.max(1000, at - Date.now() + 1000);
  capacityRetryTimer = setTimeout(function(){ capacityRetryTimer=null; boot(); }, Math.min(delay, 2147483647));
}
/* ---------- call queue: max 4 in flight ---------- */
var inFlight = 0, waiters = [];
function call(fn, args){
  return new Promise(function(res, rej){
    function run(){
      inFlight++;
      ul.call(fn, args || {}).then(function(r){ done(); res(r); }, function(e){ done(); rej(e); });
    }
    function done(){ inFlight--; if (waiters.length && inFlight < 4) waiters.shift()(); }
    if (inFlight < 4) run(); else waiters.push(run);
  });
}
/* ---------- resize discipline ---------- */
var resizeQueued = false;
function fit(){
  if (resizeQueued) return;
  resizeQueued = true;
  requestAnimationFrame(function(){
    resizeQueued = false;
    ul.resize(Math.min(900, Math.max(320, document.documentElement.scrollHeight + 4)));
  });
}
/* ---------- state ---------- */
var S = {
  overview: null, status: "active", rows: [], total: 0, selected: null,
  history: {},           // conversation_id -> {conversation, versions}
  translations: {},      // cache key -> text
  editing: false, editDirty: false, editTimer: null,
  searchTimer: null, searchMode: false,
  opLang: "English", checkDisabledUntil: 0, pendingNew: 0,
  toastTimer: null, undoDiscard: null, teachState: {}, // gap -> {saved, key, value, busy}
  loadErr: null, loadErrRaw: null, loadErrObject: null, recipientPick: null, lastRefresh: 0,
  listEpoch: 0, listedActive: null
};
var PILLS = [
  {k:"active", label:"Needs a reply"},
  {k:"no_action", label:"No reply needed"},
  {k:"resolved", label:"Replied"},
  {k:"discarded", label:"Set aside"}
];
/* ---------- data ---------- */
function loadOverview(){
  return call("inbox_overview", {}).then(function(o){
    acceptOverview(o);
  });
}
function acceptOverview(o){
  S.overview = o;
  if (o && o.operator_language) S.opLang = o.operator_language;
}
function loadList(status){
  var my = ++S.listEpoch;
  return call("conversations_list", {status: status, limit: 50}).then(function(r){
    if (my !== S.listEpoch) return; // superseded by a newer list request
    acceptList(r, status);
  });
}
function acceptList(r, status){
    var rows = r.conversations || [];
    if (status === "active"){
      var rank = function(p){ return p==="high"?0 : p==="low"?2 : 1; };
      rows.sort(function(a,b){ return rank(a.priority)-rank(b.priority) || String(a.created_at).localeCompare(String(b.created_at)); });
      S.listedActive = S.overview ? num(S.overview.counts.active) : rows.length;
      S.pendingNew = 0;
    }
    S.rows = rows; S.total = r.total || rows.length; S.searchMode = false;
}
function loadHistory(id, force){
  if (!force && S.history[id]) return Promise.resolve(S.history[id]);
  return call("conversation_history", {conversation_id:id}).then(function(h){ S.history[id]=h; return h; });
}
/* ---------- derivations ---------- */
function parseMeta(v){
  if (!v || v.metadata == null) return null;
  if (typeof v.metadata === "object") return v.metadata;
  try { return JSON.parse(v.metadata); } catch(e){ return null; }
}
function derive(h){
  var vs = h.versions || [];
  var lastSentNum = -1, latestInbound = null, drafts = [], sent = [];
  vs.forEach(function(v){
    if (v.type === "inbound") latestInbound = v;
    if (v.type === "sent" || v.type === "followup_sent"){ sent.push(v); if (v.version_num > lastSentNum) lastSentNum = v.version_num; }
  });
  vs.forEach(function(v){
    if (["auto_draft","regeneration","manual_edit","followup_draft"].indexOf(v.type) >= 0 && v.version_num > lastSentNum) drafts.push(v);
  });
  var current = drafts.length ? drafts[drafts.length-1] : null;
  var im = latestInbound ? (parseMeta(latestInbound) || {}) : {};
  var cands = [];
  (im.proposed_recipients || []).forEach(function(a){ if (a && cands.indexOf(a)<0) cands.push(a); });
  var def = im.default_recipient || h.conversation.recipient_default || h.conversation.guest_email;
  if (def && cands.indexOf(def) < 0) cands.unshift(def);
  return {
    latestInbound: latestInbound, drafts: drafts, sent: sent, current: current,
    draftNum: drafts.length,
    recipDefault: def,
    recipReason: im.recipient_reason || h.conversation.recipient_reason || "",
    candidates: cands,
    gaps: current ? ((parseMeta(current)||{}).knowledge_gaps || []) : [],
    confidence: current ? ((parseMeta(current)||{}).confidence || h.conversation.confidence) : h.conversation.confidence,
    translatedMsg: im.translated_message || null
  };
}
/* ---------- rendering ---------- */
var app = document.getElementById("app");
function render(){
  if (!ul.context) return;
  if (!ul.context.signedIn){ renderSignedOut(); return; }
  if (S.loadErr){
    var waiting = isCapacityErr(S.loadErrObject) && S.loadErrObject && S.loadErrObject.autoResumes;
    var banner = '<div class="banner'+(waiting?'':' err')+'">'+esc(S.loadErr)
      + (waiting ? '' : ' <button class="small" id="retryBtn">Try again</button>') + '</div>'
      + (S.loadErrRaw && !waiting ? '<details style="margin-top:6px"><summary>Technical details</summary><div class="whisper">'+esc(S.loadErrRaw)+'</div></details>' : '');
    if (!S.overview){
      app.innerHTML = banner + '<div class="center">The Interface is ready. Live inbox data will appear when Agent work can run.</div>';
      var retryOnly = document.getElementById("retryBtn");
      if (retryOnly) retryOnly.onclick = function(){ S.loadErr=null; S.loadErrRaw=null; S.loadErrObject=null; boot(); };
      fit(); return;
    }
    var partialHtml = banner + renderStrip() + renderPills() + renderBody();
    app.innerHTML = partialHtml;
    wire();
    var retryPartial = document.getElementById("retryBtn");
    if (retryPartial) retryPartial.onclick = function(){ S.loadErr=null; S.loadErrRaw=null; S.loadErrObject=null; boot(); };
    fit(); return;
  }
  if (!S.overview){ app.innerHTML = '<div class="skel"></div><div class="skel" style="width:70%"></div><div class="skel" style="width:85%"></div>'; fit(); return; }
  var html = renderStrip() + renderPills() + renderBody();
  app.innerHTML = html;
  wire();
  fit();
}
function renderStrip(){
  var o = S.overview, h = "";
  var big;
  if (num(o.counts.active) > 0){
    big = '<span>'+num(o.counts.active)+' need'+(num(o.counts.active)===1?"s":"")+' a reply</span>';
    if (num(o.complaints_active) > 0) big += ' · <span class="alert">'+num(o.complaints_active)+' complaint'+(num(o.complaints_active)>1?"s":"")+'</span>';
  } else {
    big = '<span class="ok">All clear</span>';
  }
  var checked = o.last_checked_at ? ('Checked '+esc(ago(o.last_checked_at, o.now))) : 'Not checked yet';
  var disabled = Date.now() < S.checkDisabledUntil ? " disabled" : "";
  h += '<div class="strip"><div><div class="big">'+big+'</div>'
    + '<div class="sub">Quietly handled '+num(o.handled_today)+' today</div></div>'
    + '<div class="right"><div>'+checked+' · <button class="small" id="checkNow"'+disabled+'>Check now</button></div>'

/* ---------- toasts ---------- */
function toast(msg, actionLabel, actionFn, ms){
  var el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = '<span>'+msg+'</span>' + (actionLabel ? '<button>'+esc(actionLabel)+'</button>' : '');
  if (actionLabel) el.querySelector("button").onclick = function(){ document.body.removeChild(el); clearTimeout(t); actionFn(); };
  document.body.appendChild(el);
  var t = setTimeout(function(){ if (el.parentNode) document.body.removeChild(el); }, ms || 4500);
}

  if (q("followupBtn")) q("followupBtn").onclick = function(){
    q("followupBtn").disabled = true; q("followupBtn").textContent = "Writing…";
    call("conversation_act", {conversation_id:S.selected, action:"followup_draft"}).then(function(){
      return loadHistory(S.selected, true);
    }).then(function(){ return Promise.all([loadOverview(), loadList(S.status)]); })
      .then(function(){ render(); toast("Follow-up draft ready."); }, function(e){ toast(esc(humanErr(e))); render(); });
  };
  if (q("draftAnywayBtn")) q("draftAnywayBtn").onclick = function(){
    q("draftAnywayBtn").disabled = true; q("draftAnywayBtn").textContent = "Writing…";
    call("conversation_act", {conversation_id:S.selected, action:"generate_draft"}).then(function(){
      return loadHistory(S.selected, true);
    }).then(function(){ return Promise.all([loadOverview(), loadList(S.status)]); })
      .then(function(){ render(); toast("Draft ready for your review."); }, function(e){ toast(esc(humanErr(e))); render(); });
  };
}
function showErr(e){
  S.loadErrObject=e; S.loadErr = humanErr(e); S.loadErrRaw = (e && e.message) || String(e);
  if (isCapacityErr(e)) scheduleCapacityResume(e);
  render();
}
/* ---------- background freshness (90s, visibility-gated, edit-paused) ---------- */
var backgroundRefreshPending = false;
function interactionActive(){
  if (S.editing) return true;
  var ae = document.activeElement;
  if (ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return true;
  var m = document.getElementById("sendMenu"); if (m && !m.hidden) return true;
  var c = document.getElementById("candList"); if (c && !c.hidden) return true;
  if (document.getElementById("steerBox")) return true;
  return false;
}
setInterval(function(){
  if (!ul.context || !ul.context.signedIn) return;
  if (document.visibilityState !== "visible") return;
  if (interactionActive()) return; // a re-render would wipe what they're doing
  // A durable Interface call can remain queued across a capacity window. Do
  // not enqueue another overview read every 90 seconds while that exact job is
  // pending, or while a structured legacy/sync wait timer is active.
  if (backgroundRefreshPending || capacityRetryTimer) return;
  backgroundRefreshPending = true;
  call("inbox_overview", {}).then(function(o){
    backgroundRefreshPending = false;
    S.overview = o;
    if (o.operator_language) S.opLang = o.operator_language;
    if (S.status === "active" && !S.searchMode && S.listedActive !== null){
      var pn = num(o.counts.active) - S.listedActive;
      if (pn > 0) S.pendingNew = pn;
    }
    /* refresh strip + pills without touching the list order */
    render();
  }, function(e){
    backgroundRefreshPending = false;
    // Only structured capacity failures alter scheduling. Ordinary transient
    // refresh failures stay silent and can try again on the next 90s tick.
    if (isCapacityErr(e)) showErr(e);
  });
}, 90000);
/* ---------- boot ---------- */
function boot(){
  if (!ul.context.signedIn){ renderSignedOut(); return; }
  if (capacityRetryTimer) { clearTimeout(capacityRetryTimer); capacityRetryTimer=null; }
  S.loadErr = null; S.loadErrRaw = null; S.loadErrObject = null;
  render(); /* skeleton */
  call("inbox_snapshot", {status:"active", limit:50}).then(function(snapshot){
    var errors = (snapshot && snapshot.errors) || [];
    if (snapshot && snapshot.overview) acceptOverview(snapshot.overview);
    if (snapshot && snapshot.conversations) acceptList(snapshot.conversations, "active");
    if (!S.overview && snapshot && snapshot.conversations){
      S.overview = {
        operator_language:S.opLang,
        counts:{active:S.rows.length,no_action:0,resolved:0,discarded:0},
        complaints_active:0,handled_today:0,checks_today:0,last_checked_at:null,now:new Date().toISOString()
      };
    }
    if (errors.length){
      showErr({code:"PARTIAL_READ", message:"Some inbox data could not be refreshed."});
      return;
    }
    render();
  }, showErr);
}
document.addEventListener("keydown", function(ev){
  if (ev.key !== "Escape") return;
  var m = document.getElementById("sendMenu"); if (m && !m.hidden){ m.hidden = true; fit(); }
  var c = document.getElementById("candList");
  if (c && !c.hidden){
    c.hidden = true;
    var t = document.getElementById("candToggle");
    if (t) t.setAttribute("aria-expanded", "false");
    fit();
  }
});
document.addEventListener("ul-ready", boot);
if (window.ul && ul.context) boot();
</script>
