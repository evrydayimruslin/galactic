<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://interfaces.connectgalactic.com" />
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/fraunces/v38/6NU78FyLNQOQZAnv9bYEvDiIdE9Ea92uemAk_WBq8U_9v0c2Wa0KxC9TeP2Xz5c.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <meta
      name="description"
      content="Conjure a persistent agent. Galactic keeps it working, and you can take it anywhere."
    />
    <!-- Open Graph / social share card. og.svg is the editable source; social
         platforms don't render SVG, so og:image points at the exported PNG
         (1200x630) — keep public/og.png in sync when og.svg changes.
         The block between og:start/og:end is the DEFAULT (home + non-public
         pages); per-agent /agents/:slug pages override it at the edge via
         functions/agents/[slug].ts. Keep the markers intact. -->
    <!-- og:start -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Galactic" />
    <meta property="og:title" content="Agents work here | Galactic" />
    <meta
      property="og:description"
      content="Conjure and host a fleet of persistent private agents from the coding agent you already use."
    />
    <meta property="og:url" content="https://connectgalactic.com/" />
    <meta property="og:image" content="https://connectgalactic.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agents work here | Galactic" />
    <meta
      name="twitter:description"
      content="Conjure and host a fleet of persistent private agents from the coding agent you already use."
    />
    <meta name="twitter:image" content="https://connectgalactic.com/og.png" />
    <!-- og:end -->
    <!-- Theme-aware favicon. The static <link> is the no-JS fallback (its own
         media query covers Firefox/Safari); favicon-theme.js swaps black/white
         for Chromium, which ignores prefers-color-scheme inside SVG favicons. -->
    <link id="favicon" rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script src="/favicon-theme.js"></script>
    <title>Galactic</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
