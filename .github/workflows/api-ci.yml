name: API CI

on:
  pull_request:
    paths:
      - 'api/**'
      # Compute crosses the API control plane; run the full API contract suite
      # for execution-plane changes as well as Compute's own focused CI.
      - 'compute-worker/**'
      - 'capacity-tail-worker/**'
      - 'apps/**'
      - 'cli/**'
      - 'packages/types/**'
      - 'scripts/contracts/**'
      - 'scripts/release/classify-cloudflare-worker-lookup.mjs'
      - 'scripts/release/classify-cloudflare-worker-lookup.test.mjs'
      - 'scripts/release/verify-api-compute-bootstrap-history.mjs'
      - 'scripts/release/verify-api-compute-bootstrap-history.test.mjs'
      - 'scripts/release/verify-api-compute-deploy-state.mjs'
      - 'scripts/release/verify-api-compute-deploy-state.test.mjs'
      - 'scripts/release/write-api-compute-disabled-config.mjs'
      - 'scripts/release/write-api-compute-disabled-config.test.mjs'
      - 'shared/**'
      - 'sdk/**'
      - 'scripts/checks/**'
      - 'supabase/**'
      - 'scripts/supabase/**'
      - 'migration-*.sql'
      - '.github/workflows/api-ci.yml'
      - '.github/workflows/compute-ci.yml'
      - '.github/workflows/compute-deploy.yml'
      - '.github/workflows/compute-admission.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'compute-worker/**'
      - 'capacity-tail-worker/**'
      - 'apps/**'
      - 'cli/**'
      - 'packages/types/**'
      - 'scripts/contracts/**'
      - 'scripts/release/classify-cloudflare-worker-lookup.mjs'
      - 'scripts/release/classify-cloudflare-worker-lookup.test.mjs'
      - 'scripts/release/verify-api-compute-bootstrap-history.mjs'
      - 'scripts/release/verify-api-compute-bootstrap-history.test.mjs'
      - 'scripts/release/verify-api-compute-deploy-state.mjs'
      - 'scripts/release/verify-api-compute-deploy-state.test.mjs'
      - 'scripts/release/write-api-compute-disabled-config.mjs'
      - 'scripts/release/write-api-compute-disabled-config.test.mjs'
      - 'shared/**'
      - 'sdk/**'
      - 'scripts/checks/**'
      - 'supabase/**'
      - 'scripts/supabase/**'
      - 'migration-*.sql'
      - '.github/workflows/api-ci.yml'
      - '.github/workflows/compute-ci.yml'
      - '.github/workflows/compute-deploy.yml'
      - '.github/workflows/compute-admission.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Deno
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/deno.zip https://github.com/denoland/deno/releases/download/v2.6.10/deno-x86_64-unknown-linux-gnu.zip
          printf '%s  %s\n' a7c9d5c1f93bfaabe03c3c0583a8c88caf695db3cec4dea2938440038609f225 /tmp/deno.zip | sha256sum -c -
          mkdir -p "$HOME/.deno/bin"
          unzip -q -o /tmp/deno.zip -d "$HOME/.deno/bin"
          chmod +x "$HOME/.deno/bin/deno"
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
          "$HOME/.deno/bin/deno" --version

      - name: Install dependencies
        run: npm ci

      - name: Generate published contract artifacts
        working-directory: .
        run: node scripts/contracts/generate-types-package.mjs

      - name: Verify generated contract artifacts are committed
        working-directory: .
        run: git diff --exit-code -- packages/types/index.d.ts packages/types/generated

      - name: Contract guardrails
        working-directory: .
        run: node scripts/checks/check-contract-guardrails.mjs

      - name: Pre-Compute deployment helpers
        working-directory: .
        run: |
          node --test \
            scripts/release/classify-cloudflare-worker-lookup.test.mjs \
            scripts/release/verify-api-compute-bootstrap-history.test.mjs \
            scripts/release/verify-api-compute-deploy-state.test.mjs \
            scripts/release/write-api-compute-disabled-config.test.mjs

      - name: Unused-code baseline
        run: npm run analyze:unused

      - name: Dependency-cycle baseline
        run: npm run analyze:deps

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:full

      - name: Wrangler Dry Run
        run: npm run deploy:dry-run

      - name: Wrangler Dry Run (staging)
        run: npx wrangler deploy --config wrangler.toml --env staging --dry-run

      - name: Verify capacity Tail Worker
        working-directory: capacity-tail-worker
        run: |
          npm ci
          deno test --no-check --no-lock src/index.test.ts
          npm run deploy:dry-run
          npm run deploy:staging:dry-run
