name: Interface Deploy Smoke

# End-to-end guard for the interface deploy+render happy-path (A6). It uploads
# the reference interface agent through ul.upload and asserts the .html is
# bundled, the launch facade exposes the interface, and the sandbox worker
# serves it — the exact path that silently broke before (CLI dropped .html;
# server TS-parser crashed) while test:full stayed green.
#
# Runs on a schedule and on changes to the surfaces that can break it. The agent
# stays PRIVATE (never goes live). Idempotent: GALACTIC_SMOKE_APP_ID re-versions
# one fixed private app instead of creating a new one each run. Without that
# secret the smoke now FAILS CLOSED — it will not silently mint a new app, which
# is what accumulated dozens of duplicate "Interface Demo" agents.
#
# OWNER ACTION: add two repo secrets —
#   ULTRALIGHT_TOKEN       a builder/operator token with agents:build
#   GALACTIC_SMOKE_APP_ID  id of the one fixed private "Interface Demo" fixture
# The workflow fails closed when either fixture input is missing.

on:
  workflow_dispatch:
  schedule:
    # Daily at 08:00 UTC.
    - cron: '0 8 * * *'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'cli/**'
      - 'shared/**'
      - 'scripts/smoke/interface-deploy-smoke.mjs'
      - 'examples/interface-demo/**'

permissions:
  contents: read

jobs:
  smoke:
    name: Interface deploy+render smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run interface deploy smoke
        env:
          GALACTIC_TOKEN: ${{ secrets.ULTRALIGHT_TOKEN }}
          GALACTIC_SMOKE_APP_ID: ${{ secrets.GALACTIC_SMOKE_APP_ID }}
          GALACTIC_API_URL: ${{ vars.GALACTIC_API_URL || 'https://api.connectgalactic.com' }}
        run: |
          if [ -z "$GALACTIC_TOKEN" ]; then
            echo "ULTRALIGHT_TOKEN is required and must include agents:build." >&2
            exit 1
          fi
          if [ -z "$GALACTIC_SMOKE_APP_ID" ]; then
            echo "GALACTIC_SMOKE_APP_ID is required; ad-hoc smoke Agents are forbidden." >&2
            exit 1
          fi
          node scripts/smoke/interface-deploy-smoke.mjs
