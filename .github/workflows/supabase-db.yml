name: Supabase DB

on:
  pull_request:
    paths:
      - 'supabase/**'
      - 'scripts/supabase/**'
      - '.github/workflows/supabase-db.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'scripts/supabase/**'
      - '.github/workflows/supabase-db.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Run validation only, or explicitly deploy staging.'
        required: true
        default: validate
        type: choice
        options:
          - validate
          - staging

permissions:
  contents: read

jobs:
  validate:
    name: Validate Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Validate local migration set
        run: bash ./scripts/supabase/validate-local.sh

  deploy_staging:
    name: Deploy staging schema
    runs-on: ubuntu-latest
    needs: validate
    # Auto-deploy staging on merges to main (when migrations change), and still
    # allow an explicit manual run via workflow_dispatch.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    environment: staging
    concurrency:
      group: supabase-staging-db
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
      SUPABASE_ENV_NAME: staging

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Push staging migrations
        run: bash ./scripts/supabase/deploy-linked.sh

      # Drift gate: after pushing, the linked staging DB must match the checked-in
      # migrations exactly. A non-empty diff means someone changed staging schema
      # out-of-band (e.g. the SQL editor) — fail so it gets captured as a migration.
      - name: Check for staging schema drift
        run: bash ./scripts/supabase/check-drift.sh
