name: Launch Web Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'apps/launch-web/**'
      - 'shared/contracts/launch.ts'
      - 'scripts/release/wait-for-workflow-run.mjs'
      - 'scripts/release/wait-for-workflow-run.test.mjs'
      - 'scripts/smoke/launch-web-pages-smoke.mjs'
      - 'scripts/smoke/launch-web-asset-integrity.mjs'
      - 'scripts/smoke/launch-web-asset-integrity.test.mjs'
      - 'scripts/smoke/wait-for-pages-deployment.mjs'
      - '.github/workflows/launch-web-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy staging or production.'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  actions: read

jobs:
  verify:
    name: Verify launch web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/launch-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Test release-order workflow helper
        working-directory: .
        run: node --test scripts/release/wait-for-workflow-run.test.mjs

      - name: Test launch-web asset-integrity smoke helper
        working-directory: .
        run: |
          node --test scripts/smoke/launch-web-asset-integrity.test.mjs
          node --check scripts/smoke/wait-for-pages-deployment.mjs

      - name: Build staging bundle
        run: pnpm run build:staging

      - name: Build production bundle
        run: pnpm run build:production

  deploy_staging:
    name: Deploy launch web to staging Pages
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_target == 'staging'
    environment: staging
    concurrency:
      group: launch-web-staging-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/launch-web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Required to decide whether this main push also changed the API
          # deployment surface. Manual Pages deploys deliberately skip the
          # cross-workflow wait so they cannot deadlock waiting for a run they
          # did not trigger.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for matching staging API/Tail deployment when required
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "$ZERO_SHA" ]] || \
             ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            api capacity-tail-worker shared .github/workflows/api-deploy.yml; then
            echo "No API/Tail deployment change in this push; Pages may deploy independently."
            exit 0
          fi

          node scripts/release/wait-for-workflow-run.mjs \
            --repository "$GITHUB_REPOSITORY" \
            --workflow api-deploy.yml \
            --workflow-name "API Deploy" \
            --sha "$GITHUB_SHA" \
            --ref-name "$GITHUB_REF_NAME" \
            --event push \
            --timeout-seconds 2400 \
            --poll-interval-seconds 20

      - name: Build staging bundle
        run: pnpm run build:staging

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_PAGES_PROJECT: ultralight-launch-web
        run: |
          set -euo pipefail

          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}"
          status="$(curl -sS -o /tmp/pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_url}")"

          if [[ "${status}" == "200" ]]; then
            echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT} already exists."
            exit 0
          fi

          if [[ "${status}" != "404" ]]; then
            echo "Unexpected Cloudflare Pages project lookup response: ${status}" >&2
            cat /tmp/pages-project.json >&2
            exit 1
          fi

          echo "Creating Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT}."
          create_status="$(curl -sS -o /tmp/pages-project-create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT}\",\"production_branch\":\"main\"}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects")"

          if [[ "${create_status}" != "200" && "${create_status}" != "201" ]]; then
            echo "Cloudflare Pages project create failed: ${create_status}" >&2
            cat /tmp/pages-project-create.json >&2
            exit 1
          fi

      - name: Deploy staging Pages branch
        run: pnpm dlx wrangler@4.67.0 pages deploy dist --project-name ultralight-launch-web --branch staging

      - name: Wait for exact staging Pages assets to propagate
        working-directory: .
        run: |
          node scripts/smoke/wait-for-pages-deployment.mjs \
            --pages-url https://staging.ultralight-launch-web.pages.dev \
            --dist-dir apps/launch-web/dist \
            --timeout-ms 300000 \
            --interval-ms 3000 \
            --consecutive-passes 2

  deploy_production:
    name: Deploy launch web to production Pages
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event.inputs.deploy_target == 'production'
    environment: production
    concurrency:
      group: launch-web-production-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/launch-web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for matching production API/Tail deployment
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/release/wait-for-workflow-run.mjs \
            --repository "$GITHUB_REPOSITORY" \
            --workflow api-deploy.yml \
            --workflow-name "API Deploy" \
            --sha "$GITHUB_SHA" \
            --ref-name "$GITHUB_REF_NAME" \
            --event push \
            --timeout-seconds 3000 \
            --poll-interval-seconds 20

      - name: Build production bundle
        run: pnpm run build:production

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_PAGES_PROJECT: ultralight-launch-web
        run: |
          set -euo pipefail

          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}"
          status="$(curl -sS -o /tmp/pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_url}")"

          if [[ "${status}" == "200" ]]; then
            echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT} already exists."
            exit 0
          fi

          if [[ "${status}" != "404" ]]; then
            echo "Unexpected Cloudflare Pages project lookup response: ${status}" >&2
            cat /tmp/pages-project.json >&2
            exit 1
          fi

          echo "Creating Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT}."
          create_status="$(curl -sS -o /tmp/pages-project-create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT}\",\"production_branch\":\"main\"}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects")"

          if [[ "${create_status}" != "200" && "${create_status}" != "201" ]]; then
            echo "Cloudflare Pages project create failed: ${create_status}" >&2
            cat /tmp/pages-project-create.json >&2
            exit 1
          fi

      - name: Deploy production Pages branch
        run: pnpm dlx wrangler@4.67.0 pages deploy dist --project-name ultralight-launch-web --branch main

      - name: Wait for exact production Pages assets to propagate
        working-directory: .
        run: |
          node scripts/smoke/wait-for-pages-deployment.mjs \
            --pages-url https://connectgalactic.com \
            --dist-dir apps/launch-web/dist \
            --timeout-ms 300000 \
            --interval-ms 3000 \
            --consecutive-passes 2
