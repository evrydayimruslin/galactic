name: Supabase Production DB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Run validation only, or explicitly deploy production.'
        required: true
        default: validate
        type: choice
        options:
          - validate
          - production

permissions:
  contents: read

jobs:
  validate:
    name: Validate Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Validate local migration set
        run: bash ./scripts/supabase/validate-local.sh

  deploy_production:
    name: Deploy production schema
    runs-on: ubuntu-latest
    needs: validate
    # Release tags must run the real idempotent production push, not only the
    # local migration validator. The Production Launch Gate treats this
    # workflow as schema evidence, so skipping this job on tags could otherwise
    # produce a false-green release with unapplied migrations.
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production')
    environment: production
    concurrency:
      group: supabase-production-db
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
      SUPABASE_ENV_NAME: production
      # Keep drift report-only until the remaining historical production drift
      # has been reconciled. Migration application itself is blocking above;
      # this setting only prevents a known legacy diff from masking a release.
      DRIFT_REPORT_ONLY: "1"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Push production migrations
        run: bash ./scripts/supabase/deploy-linked.sh

      # Confirm the promotion landed clean: prod's live schema must match the
      # checked-in migrations. Fails the run (alert only — nothing is rolled
      # back) if prod has drifted from the migration files.
      - name: Check for production schema drift
        run: bash ./scripts/supabase/check-drift.sh
