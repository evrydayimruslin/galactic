# G1 launch-verification smoke — runs docs/G1_LAUNCH_VERIFICATION_RUNBOOK.md
# steps 1-3 (secrets preflight → release-packet scaffold → full smoke suite)
# against staging or production, entirely in CI where the smoke credentials
# live, and uploads the evidence dir as an artifact for the release packet.
#
# Credentials (repo secrets):
#   ULTRALIGHT_TOKEN_STAGING      — staging-only builder/operator token
#   GALACTIC_SMOKE_APP_ID_STAGING — fixed private staging smoke Agent
#   ULTRALIGHT_TOKEN              — production builder/operator token
#   GALACTIC_SMOKE_APP_ID         — fixed private production smoke Agent
# Missing required inputs fail closed; certification cannot silently skip the
# canonical deploy surface.

name: G1 Launch Smoke

on:
  workflow_call:
    inputs:
      target:
        description: 'Environment to verify'
        required: true
        type: string
      durable_app:
        description: 'Optional override for the fixed durable-smoke Agent id'
        required: false
        default: ''
        type: string
      durable_function:
        description: 'Optional override for the durable function'
        required: false
        default: ''
        type: string
      require_release_tag:
        description: 'Fail unless the reusable smoke is running at a v* tag'
        required: false
        default: false
        type: boolean
    secrets:
      ULTRALIGHT_TOKEN_STAGING:
        required: false
      GALACTIC_SMOKE_APP_ID_STAGING:
        required: false
      ULTRALIGHT_TOKEN:
        required: false
      GALACTIC_SMOKE_APP_ID:
        required: false
  workflow_dispatch:
    inputs:
      target:
        description: 'Environment to verify'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      durable_app:
        description: 'Optional override for the fixed durable-smoke Agent id'
        required: false
        default: ''
      durable_function:
        description: 'Optional override for the durable function (default: get_greeting)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: g1-launch-smoke-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  smoke:
    name: G1 smoke (${{ inputs.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Never send a production credential to staging (or vice versa). The
      # environments use isolated Supabase users/token hashes and Agent rows.
      ULTRALIGHT_TOKEN: ${{ (inputs.target == 'staging' && secrets.ULTRALIGHT_TOKEN_STAGING) || (inputs.target == 'production' && secrets.ULTRALIGHT_TOKEN) }}
      # Fixed smoke fixture app — interface-deploy-smoke refuses to run without
      # it (creating apps ad hoc was the duplicate-Interface-Demo bug).
      GALACTIC_SMOKE_APP_ID: ${{ (inputs.target == 'staging' && secrets.GALACTIC_SMOKE_APP_ID_STAGING) || (inputs.target == 'production' && secrets.GALACTIC_SMOKE_APP_ID) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve candidate id + evidence dir
        id: cid
        shell: bash
        run: |
          set -euo pipefail
          SAFE_REF="$(printf '%s' "$GITHUB_REF_NAME" | tr -c 'A-Za-z0-9._-' '-')"
          CID="$(date -u +%F)-${SAFE_REF}-$(git rev-parse --short=7 HEAD)"
          DIR="docs/_generated/launch/${{ inputs.target }}/$CID"
          mkdir -p "$DIR"
          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "candidate: $CID → $DIR"

      - name: Verify reusable production smoke is pinned to the release tag
        if: inputs.require_release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Reusable production smoke must be called from a v* tag workflow, got $GITHUB_REF."
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
            echo "::error::Smoke checkout does not match the tagged candidate SHA."
            exit 1
          fi

      - name: Secrets preflight (verify-secrets)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ops/verify-secrets.mjs \
            --target "${{ inputs.target }}" \
            --token "$ULTRALIGHT_TOKEN" \
            | tee "${{ steps.cid.outputs.dir }}/verify-secrets.txt"

      - name: Scaffold release packet
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ops/init-release-packet.mjs \
            --target "${{ inputs.target }}" \
            --commit-sha "$(git rev-parse HEAD)" \
            --git-ref "$GITHUB_REF_NAME" \
            --operator "github-actions/g1-launch-smoke" \
            --release-lead "Russell In" \
            --rollback-owner "Russell In" \
            --communications-owner "Russell In" \
            --output-dir "${{ steps.cid.outputs.dir }}"

      - name: Run smoke suite
        shell: bash
        run: |
          set -euo pipefail
          node scripts/smoke/run-staging-smoke-suite.mjs \
            --target "${{ inputs.target }}" \
            ${{ inputs.durable_app && format('--durable-app {0}', inputs.durable_app) || '' }} \
            ${{ inputs.durable_function && format('--durable-function {0}', inputs.durable_function) || '' }} \
            --output-dir "${{ steps.cid.outputs.dir }}"

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          SUMMARY="${{ steps.cid.outputs.dir }}/g1-smoke-suite-summary.md"
          if [[ -f "$SUMMARY" ]]; then
            cat "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g1-evidence-${{ inputs.target }}-${{ steps.cid.outputs.cid }}
          path: ${{ steps.cid.outputs.dir }}
          if-no-files-found: error
