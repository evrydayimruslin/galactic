name: API Deploy

# This workflow is only valid once the Compute service-binding target exists.
# First-install bootstrap is an explicit, manually approved Compute Deploy
# operation. Normal staging and production releases fail closed when the
# binding target cannot be verified.
on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'api/**'
      - 'capacity-tail-worker/**'
      - 'shared/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy staging. Production API releases require an immutable v* tag.'
        required: true
        default: staging
        type: choice
        options:
          - staging

permissions:
  contents: read
  actions: read

jobs:
  verify:
    name: Verify API before deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Deno
        run: |
          set -euo pipefail
          deno_archive="$RUNNER_TEMP/deno-x86_64-unknown-linux-gnu.zip"
          deno_sha256=a7c9d5c1f93bfaabe03c3c0583a8c88caf695db3cec4dea2938440038609f225
          curl -fsSL -o "$deno_archive" https://github.com/denoland/deno/releases/download/v2.6.10/deno-x86_64-unknown-linux-gnu.zip
          printf '%s  %s\n' "$deno_sha256" "$deno_archive" | sha256sum -c -
          mkdir -p "$HOME/.deno/bin"
          unzip -q -o "$deno_archive" -d "$HOME/.deno/bin"
          chmod +x "$HOME/.deno/bin/deno"
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
          "$HOME/.deno/bin/deno" --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:full

      - name: Wrangler Dry Run (production)
        run: npm run deploy:dry-run

      - name: Wrangler Dry Run (staging)
        run: npx wrangler deploy --config wrangler.toml --env staging --dry-run

      - name: Verify capacity Tail Worker
        working-directory: capacity-tail-worker
        run: |
          npm ci
          deno test --no-check --no-lock src/index.test.ts
          npm run deploy:dry-run
          npm run deploy:staging:dry-run

  deploy_staging:
    name: Deploy API to staging
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_target == 'staging'
    environment: staging
    concurrency:
      group: api-staging-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # The schema-order check compares the complete push range, which can
          # span more than one commit after a rebase merge/direct push.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify staging Compute binding target
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler deployments list --name galactic-compute-staging --json >/dev/null
          echo "Verified staging Compute binding target."

      - name: Wait for matching staging schema when migrations changed
        working-directory: .
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "$ZERO_SHA" ]] || \
             ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
            echo "Push base unavailable; falling back to parent commit $BASE_SHA."
          fi

          echo "Checking schema changes across $BASE_SHA..$GITHUB_SHA."
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            supabase scripts/supabase .github/workflows/supabase-db.yml; then
            echo "No staging schema change in this candidate."
            exit 0
          fi
          for attempt in $(seq 1 90); do
            read -r status conclusion < <(
              gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/supabase-db.yml/runs?head_sha=${GITHUB_SHA}&event=push&per_page=10" \
                --jq '.workflow_runs | sort_by(.created_at) | last // {} | [(.status // "missing"), (.conclusion // "")] | @tsv'
            )
            if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
              echo "Matching staging schema deployment succeeded."
              exit 0
            fi
            if [[ "$status" == "completed" ]]; then
              echo "Matching staging schema workflow concluded: $conclusion" >&2
              exit 1
            fi
            echo "Waiting for staging schema workflow ($status; attempt $attempt/90)."
            sleep 20
          done
          echo "Timed out waiting for matching staging schema workflow." >&2
          exit 1

      - name: Provision queues (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for q in ultralight-exec-staging ultralight-exec-staging-dlq ultralight-events-staging ultralight-events-staging-dlq ultralight-capacity-telemetry-staging ultralight-capacity-telemetry-staging-dlq; do
            npx wrangler queues list | grep -qE "(^|[^-])$q([^-]|$)" || npx wrangler queues create "$q"
          done

      - name: Install staging capacity Tail dependencies
        working-directory: capacity-tail-worker
        run: npm ci

      - name: Deploy staging capacity Tail Worker
        working-directory: capacity-tail-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:staging

      - name: Deploy staging worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml --env staging --keep-vars --tag "api-$GITHUB_SHA"

  deploy_production:
    name: Deploy API to production
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production
    concurrency:
      group: api-production-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify production Compute binding target
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler deployments list --name galactic-compute --json >/dev/null
          echo "Verified production Compute binding target."

      - name: Wait for matching production schema
        working-directory: .
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            read -r status conclusion < <(
              gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/supabase-production-db.yml/runs?head_sha=${GITHUB_SHA}&event=push&per_page=10" \
                --jq '.workflow_runs | sort_by(.created_at) | last // {} | [(.status // "missing"), (.conclusion // "")] | @tsv'
            )
            if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
              echo "Matching production schema deployment succeeded."
              exit 0
            fi
            if [[ "$status" == "completed" ]]; then
              echo "Matching production schema workflow concluded: $conclusion" >&2
              exit 1
            fi
            echo "Waiting for production schema workflow ($status; attempt $attempt/120)."
            sleep 20
          done
          echo "Timed out waiting for matching production schema workflow." >&2
          exit 1

      - name: Provision queues (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for q in ultralight-exec ultralight-exec-dlq ultralight-events ultralight-events-dlq ultralight-capacity-telemetry ultralight-capacity-telemetry-dlq; do
            npx wrangler queues list | grep -qE "(^|[^-])$q([^-]|$)" || npx wrangler queues create "$q"
          done

      - name: Install production capacity Tail dependencies
        working-directory: capacity-tail-worker
        run: npm ci

      - name: Deploy production capacity Tail Worker
        working-directory: capacity-tail-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy

      - name: Deploy production worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml --env="" --keep-vars --tag "api-$GITHUB_SHA"
