name: Supabase Prod — one-shot apply

# Deliberate, manual prod migration apply. Run "dryrun" first to execute the
# real database push planner, then re-run "apply" with confirm=APPLY. Crossing
# a historical gap additionally requires include_all=true and
# confirm=APPLY_ALL. Uses the GitHub prod secrets — no credentials are ever
# pasted anywhere. The dispatched branch supplies the migration files.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'dryrun = plan pending migrations (no changes); apply = push migrations to prod'
        required: true
        default: dryrun
        type: choice
        options:
          - dryrun
          - apply
      confirm:
        description: 'Type APPLY, or APPLY_ALL when include_all is enabled (apply mode only)'
        required: false
        default: ''
      include_all:
        description: 'Explicitly cross historical migration gaps (--include-all)'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate local migration set
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate migrations locally (Docker pg + reset + lint)
        run: bash ./scripts/supabase/validate-local.sh

  run:
    name: ${{ inputs.mode == 'apply' && 'Apply to production' || 'Dry run (production)' }}
    needs: validate
    runs-on: ubuntu-latest
    # Scopes the prod secrets to this job + lets you require a reviewer on the
    # "production" environment (Settings → Environments) as a second gate.
    environment: production
    concurrency:
      group: supabase-production-db
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
      SUPABASE_ENV_NAME: production
      SUPABASE_INCLUDE_ALL: ${{ inputs.include_all && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Applying across a historical gap is materially broader than a normal
      # forward push, so it has a distinct confirmation phrase.
      - name: Guard — apply requires the matching confirmation
        if: >-
          inputs.mode == 'apply' &&
          ((inputs.include_all && inputs.confirm != 'APPLY_ALL') ||
           (!inputs.include_all && inputs.confirm != 'APPLY'))
        run: |
          echo "::error::Use confirm=APPLY for a normal push or confirm=APPLY_ALL when include_all is enabled."
          exit 1

      - name: Dry run — plan pending production migrations (no changes)
        if: ${{ inputs.mode == 'dryrun' }}
        env:
          DRY_RUN: "1"
        run: bash ./scripts/supabase/deploy-linked.sh

      - name: Apply — push migrations to production
        if: ${{ inputs.mode == 'apply' }}
        run: bash ./scripts/supabase/deploy-linked.sh

      # Report-only: prod intentionally runs a curated subset, so a diff is
      # expected and must not fail the run — it's logged for visibility.
      - name: Check production schema drift (report only)
        if: ${{ inputs.mode == 'apply' }}
        env:
          DRIFT_REPORT_ONLY: "1"
        run: bash ./scripts/supabase/check-drift.sh
