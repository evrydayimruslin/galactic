name: CLI npm Publish

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Dry run (pack only) or publish to npm for real.'
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read

jobs:
  publish:
    name: Verify and publish galacticconnection
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Verify compute-job auth and artifact contracts
        shell: bash
        run: |
          set -euo pipefail
          npm run test:job-mode
          deno_version=2.6.10
          deno_archive=deno-x86_64-unknown-linux-gnu.zip
          deno_sha256=a7c9d5c1f93bfaabe03c3c0583a8c88caf695db3cec4dea2938440038609f225
          deno_dir="$RUNNER_TEMP/deno"
          mkdir -p "$deno_dir"
          curl -fsSL \
            "https://github.com/denoland/deno/releases/download/v${deno_version}/${deno_archive}" \
            -o "$RUNNER_TEMP/$deno_archive"
          printf '%s  %s\n' "$deno_sha256" "$RUNNER_TEMP/$deno_archive" | sha256sum -c -
          unzip -q "$RUNNER_TEMP/$deno_archive" -d "$deno_dir"
          "$deno_dir/deno" test \
            --no-config \
            --allow-env --allow-read --allow-write --allow-net \
            --lock=deno.lock --frozen \
            tests/compute-job-mode.test.ts

      - name: Verify version sync (package.json vs mod.ts)
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if ! grep -Fq "const VERSION = '${PKG_VERSION}'" mod.ts; then
            echo "cli/mod.ts VERSION does not match cli/package.json (${PKG_VERSION}) — bump both together." >&2
            exit 1
          fi
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          if [ "${TAG_VERSION}" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${{ steps.version.outputs.version }}." >&2
            exit 1
          fi

      - name: Fail if version already on npm
        run: |
          if npm view "galacticconnection@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "galacticconnection@${{ steps.version.outputs.version }} is already published — bump the version first." >&2
            exit 1
          fi

      # prepublishOnly also copies this, but with `|| true` — copy loudly here
      # so a missing skills.md fails the run instead of shipping without docs.
      - name: Bundle platform skills doc
        run: cp ../skills.md skills.md

      - name: Pack (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        run: npm publish --dry-run

      - name: Publish to npm
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish')
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
