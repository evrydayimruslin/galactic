name = "ultralight-data"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# R2 bucket binding — native access to your existing ultralight bucket
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ultralight-apps"

# KV namespace for code cache
[[kv_namespaces]]
binding = "CODE_CACHE"
id = "d348ee797036460faf4b3e014921f0b0"

# Secrets (set via: wrangler secret put <NAME>):
#   WORKER_SECRET       — shared secret for DO API → Worker auth
#   CF_ACCOUNT_ID       — Cloudflare account ID for D1 API access
#   CF_API_TOKEN        — Cloudflare API token with D1 read/write permissions
#   DATA_TENANT_SECRET  — per-tenant proof signing secret. MUST be identical to
#                         the API worker's DATA_TENANT_SECRET. Deliberately
#                         distinct from WORKER_SECRET (which is sandbox-exposed),
#                         so a WORKER_SECRET leak can't forge cross-tenant access.

[vars]
ENVIRONMENT = "production"
# Require a valid per-tenant token on every data call (reject if absent/invalid),
# so a leaked WORKER_SECRET alone can't forge cross-tenant access. Tenant-token
# coverage is 100% — every /data/* call funnels through createWorkerAppDataService
# → workerFetch, which always sets X-Tenant-Token (api/services/appdata.ts).
# PRECONDITION: a real (non-default) DATA_TENANT_SECRET must be set on BOTH this
# worker AND the API worker, identical — otherwise the production footgun guard
# (src/index.ts) refuses to serve (503). Takes effect on `cd worker && wrangler deploy`.
DATA_TENANT_ENFORCE = "1"
